<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Atividade de CSS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      padding: 40px;
    }

    .titulo {
      color: #2c3e50;
      font-size: 48px;
      font-family: 'Arial Black', sans-serif;
      margin-bottom: 30px;
    }

    .par1 {
      color: white;
      background-color: #e74c3c;
      padding: 10px;
    }

    .par2 {
      color: black;
      background-color: #f1c40f;
      padding: 10px;
    }

    .par3 {
      color: white;
      background-color: #2ecc71;
      padding: 10px;
    }

    .caixa {
      border: 3px solid #34495e;
      padding: 20px;
      margin: 30px 0;
      background-color: #ecf0f1;
    }

    .botao {
      background-color: #3498db;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .botao:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>

  <h1 class="titulo">Bem-vindo ao meu site!</h1>

  <p class="par1">Este é o primeiro parágrafo com fundo vermelho.</p>
  <p class="par2">Este é o segundo parágrafo com fundo amarelo.</p>
  <p class="par3">Este é o terceiro parágrafo com fundo verde.</p>

  <div class="caixa">
    Esta é uma caixa com border, padding e margin visíveis.
  </div>

  <button class="botao">Clica aqui</button>

</body>
</html>
